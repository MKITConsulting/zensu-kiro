# git-cliff configuration for the Release pipeline (.github/workflows/release.yml).
# Generates ONE CHANGELOG section per release from the conventional commits since
# the last tag, using Keep a Changelog headings so generated sections match the
# existing hand-written history in CHANGELOG.md. The workflow splices this section
# under `## [Unreleased]`; it never rewrites historical sections.

[changelog]
header = ""
body = """
## [{{ version | trim_start_matches(pat="v") }}] - {{ timestamp | date(format="%Y-%m-%d") }}
{% for group, commits in commits | group_by(attribute="group") %}
{{ group }}
{% for commit in commits %}
- {% if commit.scope %}**{{ commit.scope }}**: {% endif %}{{ commit.message | upper_first }}
{%- endfor %}
{% endfor %}"""
trim = true

[git]
conventional_commits = true
filter_unconventional = true
split_commits = false
commit_parsers = [
    { message = "^chore\\(release\\)", skip = true },
    { message = "^Merge", skip = true },
    { message = "^feat", group = "### Added" },
    { message = "^fix", group = "### Fixed" },
    { message = "^deprecat", group = "### Deprecated" },
    { message = "^perf", group = "### Changed" },
    { message = "^refactor", group = "### Changed" },
    { message = "^docs", group = "### Changed" },
    { message = "^style", group = "### Changed" },
    { message = "^test", group = "### Changed" },
    { message = "^build", group = "### Changed" },
    { message = "^ci", group = "### Changed" },
    { message = "^chore", group = "### Changed" },
]
filter_commits = false
tag_pattern = "v[0-9].*"
sort_commits = "newest"
